<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vaibhav · upload</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 16px;
    }
    .container { width: 100%; max-width: 520px; }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #00d9ff;
      margin-bottom: 20px;
      text-align: center;
    }
    .drop-zone {
      border: 2px dashed #555;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #2a2a3e;
      margin-bottom: 16px;
    }
    .drop-zone.dragover {
      border-color: #00d9ff;
      background: rgba(0, 217, 255, 0.08);
    }
    .drop-zone p { color: #aaa; font-size: 0.95rem; }
    .drop-zone .icon { font-size: 2rem; margin-bottom: 8px; }
    .file-list {
      margin-bottom: 16px;
      font-size: 0.85rem;
      color: #aaa;
    }
    .file-list span { color: #00d9ff; }
    .field {
      background: #2a2a3e;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      background: #1a1a2e;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 10px 12px;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
    }
    .field input:focus { border-color: #00d9ff; }
    .btn-upload {
      width: 100%;
      padding: 14px;
      background: #00d9ff;
      color: #1a1a2e;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-upload:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-upload:not(:disabled):active { opacity: 0.8; }
    .results { margin-top: 24px; }
    .result-card {
      background: #2a2a3e;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .result-card .filename {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 8px;
    }
    .path-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1a1a2e;
      border-radius: 8px;
      padding: 8px 12px;
    }
    .path-row code {
      flex: 1;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.82rem;
      color: #00d9ff;
      word-break: break-all;
    }
    .btn-copy {
      flex-shrink: 0;
      padding: 6px 14px;
      background: #00d9ff;
      color: #1a1a2e;
      border: none;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-copy.copied { background: #4caf50; color: #fff; }
    .preview {
      margin-top: 10px;
      border-radius: 8px;
      overflow: hidden;
    }
    .preview img {
      width: 100%;
      display: block;
      border-radius: 8px;
    }
    .status {
      text-align: center;
      margin-top: 12px;
      font-size: 0.85rem;
      color: #888;
    }
    .status.error { color: #ff5252; }
  </style>
</head>
<body>
  <div class="container">
    <h1><svg width="24" height="24" viewBox="0 0 108 108" style="vertical-align:-3px;margin-right:4px"><rect width="108" height="108" rx="16" fill="#1a1a2e"/><path d="M34,30 L54,78 L74,30 L68,30 L54,68 L40,30 Z" fill="#8BE9FD"/><path d="M30,82 L78,82 L78,78 L30,78 Z" fill="#50FA7B"/><path d="M28,82 L32,82 L32,86 L28,86 Z" fill="#8BE9FD"/></svg> vaibhav upload</h1>

    <div class="drop-zone" id="dropZone">
      <div class="icon">📁</div>
      <p>Tap to select or drag &amp; drop files</p>
    </div>
    <input type="file" id="fileInput" multiple hidden>
    <div class="file-list" id="fileList"></div>

    <div class="field">
      <label for="subdir">Subdirectory (optional)</label>
      <input type="text" id="subdir" placeholder="e.g. screenshots">
    </div>

    <button class="btn-upload" id="uploadBtn" disabled>Upload</button>
    <div class="status" id="status"></div>

    <div class="results" id="results"></div>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const uploadBtn = document.getElementById('uploadBtn');
    const subdirInput = document.getElementById('subdir');
    const status = document.getElementById('status');
    const results = document.getElementById('results');

    let selectedFiles = [];

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      setFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', () => {
      setFiles(fileInput.files);
    });

    function setFiles(files) {
      selectedFiles = Array.from(files);
      uploadBtn.disabled = selectedFiles.length === 0;
      if (selectedFiles.length === 0) {
        fileList.innerHTML = '';
      } else {
        const names = selectedFiles.map(f => f.name);
        fileList.innerHTML = '<span>' + selectedFiles.length + ' file' +
          (selectedFiles.length > 1 ? 's' : '') + ':</span> ' + names.join(', ');
      }
    }

    uploadBtn.addEventListener('click', async () => {
      if (selectedFiles.length === 0) return;
      uploadBtn.disabled = true;
      status.className = 'status';
      status.textContent = 'Uploading…';
      results.innerHTML = '';

      const subdir = subdirInput.value.trim();

      for (const file of selectedFiles) {
        const formData = new FormData();
        formData.append('file', file);
        if (subdir) formData.append('subdir', subdir);

        try {
          const res = await fetch('/api/upload', { method: 'POST', body: formData });
          if (!res.ok) {
            const err = await res.text();
            throw new Error(err || res.statusText);
          }
          const data = await res.json();
          addResult(file, data);
        } catch (err) {
          addError(file, err.message);
        }
      }

      status.textContent = 'Done';
      selectedFiles = [];
      fileList.innerHTML = '';
      fileInput.value = '';
    });

    function addResult(file, data) {
      const filePath = data.path || data.filePath || '';
      const card = document.createElement('div');
      card.className = 'result-card';

      let html = '<div class="filename">' + escapeHtml(file.name) + '</div>';
      html += '<div class="path-row">';
      html += '<code>' + escapeHtml(filePath) + '</code>';
      html += '<button class="btn-copy" onclick="copyPath(this, \'' + escapeAttr(filePath) + '\')">Copy</button>';
      html += '</div>';

      if (file.type && file.type.startsWith('image/')) {
        const url = URL.createObjectURL(file);
        html += '<div class="preview"><img src="' + url + '" alt="preview"></div>';
      }

      card.innerHTML = html;
      results.appendChild(card);
    }

    function addError(file, message) {
      const card = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML = '<div class="filename">' + escapeHtml(file.name) + '</div>' +
        '<div style="color:#ff5252;font-size:0.85rem;">Error: ' + escapeHtml(message) + '</div>';
      results.appendChild(card);
    }

    async function copyPath(btn, path) {
      try {
        await navigator.clipboard.writeText(path);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = path;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 1500);
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function escapeAttr(s) {
      return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
