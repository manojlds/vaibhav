<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="icon" href="/icon-192.png" />
  <title>vaibhav · dev servers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: system-ui, -apple-system, sans-serif; min-height: 100dvh; }

    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #2a2a4a;
    }
    .header h1 { font-size: 18px; font-weight: 600; color: #00d9ff; }
    .header a {
      color: #555; text-decoration: none; font-size: 13px;
      padding: 4px 12px; border: 1px solid #2a2a4a; border-radius: 6px;
      transition: color .15s, border-color .15s;
    }
    .header a:hover { color: #00d9ff; border-color: #00d9ff; }

    .content { padding: 16px 20px; max-width: 900px; margin: 0 auto; }

    .empty { color: #555; font-size: 14px; text-align: center; margin-top: 40px; }
    .empty code { color: #888; background: #16162a; padding: 2px 8px; border-radius: 4px; font-size: 13px; }

    .loading { color: #555; font-size: 14px; text-align: center; margin-top: 40px; }

    .server-list { list-style: none; display: flex; flex-direction: column; gap: 14px; }

    .project-card {
      background: #141428;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 14px;
    }
    .project-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
      gap: 8px;
      flex-wrap: wrap;
    }
    .project-title {
      display: flex; align-items: center; gap: 8px;
    }
    .project-name { font-size: 16px; font-weight: 700; color: #8BE9FD; }
    .project-meta { color: #666; font-size: 12px; }

    .project-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .project-actions button {
      background: #1f1f34;
      border: 1px solid #3a3a5a;
      color: #d9d9d9;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }
    .project-actions button:hover { border-color: #00d9ff; color: #00d9ff; }

    .server-card {
      background: #16162a;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 12px;
      transition: border-color .15s;
      margin-top: 8px;
    }
    .server-card:hover { border-color: #3a3a5a; }

    .server-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .server-name { font-weight: 700; font-size: 14px; color: #e0e0e0; }
    .server-status {
      font-size: 11px; font-weight: 600; padding: 3px 10px;
      border-radius: 12px; text-transform: uppercase; letter-spacing: 0.03em;
    }
    .server-status.running { background: #1a3a2a; color: #50FA7B; }
    .server-status.stopped { background: #3a1a1a; color: #FF5555; }

    .server-urls { margin-bottom: 12px; }
    .server-url {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; padding: 4px 0;
    }
    .server-url .label { color: #555; min-width: 60px; }
    .server-url a {
      color: #00d9ff; text-decoration: none;
      word-break: break-all;
      transition: color .15s;
    }
    .server-url a:hover { color: #8BE9FD; }
    .server-url .port { color: #888; }

    .server-actions {
      display: flex; gap: 8px;
      border-top: 1px solid #2a2a4a;
      padding-top: 10px;
    }
    .server-actions button {
      flex: 0 0 auto;
      background: #2a2a3e;
      border: 1px solid #3a3a5a;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s;
    }

    .server-empty {
      color: #666;
      font-size: 13px;
      padding: 8px 2px;
      border-top: 1px dashed #2a2a4a;
      margin-top: 8px;
    }
    .server-actions button:hover { border-color: #00d9ff; color: #00d9ff; }
    .server-actions button:active { background: #3a3a5a; }
    .server-actions button.stop:hover { border-color: #FF5555; color: #FF5555; }
    .server-actions button.start:hover { border-color: #50FA7B; color: #50FA7B; }
    .server-actions button:disabled {
      opacity: 0.4; cursor: not-allowed;
      border-color: #3a3a5a; color: #888;
    }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #2a2a3e; border: 1px solid #3a3a5a;
      color: #e0e0e0; font-size: 13px;
      padding: 10px 20px; border-radius: 8px;
      opacity: 0; transition: opacity .3s;
      pointer-events: none; z-index: 100;
    }
    .toast.visible { opacity: 1; }
    .toast.error { border-color: #FF5555; color: #FF5555; }
    .toast.success { border-color: #50FA7B; color: #50FA7B; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🚀 Dev Servers</h1>
    <a href="/">← Home</a>
  </div>

  <div class="content">
    <div class="loading" id="loading">Loading...</div>
    <ul class="server-list" id="server-list" style="display:none"></ul>
      <div class="empty" id="empty" style="display:none">
      No projects found.<br><br>
      Register one with<br><code>vaibhav add &lt;name&gt; &lt;path&gt;</code>
      </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const $list = document.getElementById('server-list');
    const $loading = document.getElementById('loading');
    const $empty = document.getElementById('empty');
    const $toast = document.getElementById('toast');
    let toastTimer = null;

    function showToast(msg, type = '', sticky = false) {
      clearTimeout(toastTimer);
      $toast.textContent = msg;
      $toast.className = 'toast visible ' + type;
      if (!sticky) {
        toastTimer = setTimeout(() => { $toast.className = 'toast'; }, 3000);
      }
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function fetchStatus() {
      const res = await fetch(`/api/status?_=${Date.now()}`, { cache: 'no-store' });
      return res.json();
    }

    function matchesExpectedState(data, project, process, expectedRunning) {
      const servers = (data.devServers || []).filter(s => s.project === project && (!process || s.process === process));

      if (servers.length === 0) {
        return expectedRunning === false;
      }

      return expectedRunning
        ? servers.every(s => s.running)
        : servers.every(s => !s.running);
    }

    async function pollUntilState(project, process, expectedRunning) {
      const timeoutMs = expectedRunning ? 120000 : 30000;
      const intervalMs = 1000;
      const startedAt = Date.now();

      while ((Date.now() - startedAt) < timeoutMs) {
        try {
          const data = await fetchStatus();
          renderServers(data.devServers || [], data.projects || []);
          if (matchesExpectedState(data, project, process, expectedRunning)) {
            return true;
          }
        } catch {
          // keep polling
        }
        await sleep(intervalMs);
      }

      return false;
    }

    function renderServers(servers, projects) {
      $loading.style.display = 'none';

      const projectNames = Array.from(new Set([
        ...(projects || []).map(p => p.name),
        ...(servers || []).map(s => s.project),
      ])).sort((a, b) => {
        const aRunning = (servers || []).filter(s => s.project === a && s.running).length;
        const bRunning = (servers || []).filter(s => s.project === b && s.running).length;
        if (aRunning !== bRunning) return bRunning - aRunning;
        return a.localeCompare(b);
      });

      if (projectNames.length === 0) {
        $list.style.display = 'none';
        $empty.style.display = 'block';
        return;
      }

      $empty.style.display = 'none';
      $list.style.display = 'flex';
      $list.innerHTML = '';

      projectNames.forEach(project => {
        const projectServers = (servers || [])
          .filter(s => s.project === project)
          .sort((a, b) => {
            if (a.running !== b.running) return a.running ? -1 : 1;
            return (a.process || '').localeCompare(b.process || '');
          });
        const runningCount = projectServers.filter(s => s.running).length;

        const li = document.createElement('li');
        li.innerHTML = `
          <div class="project-card">
            <div class="project-top">
              <div class="project-title">
                <span class="project-name">${project}</span>
                <span class="project-meta">${runningCount}/${projectServers.length} running</span>
              </div>
              <div class="project-actions">
                <button data-target="${project}::all" onclick="devAction('start', '${project}', '')">Start all</button>
                <button data-target="${project}::all" onclick="devAction('restart', '${project}', '')">Restart all</button>
                <button data-target="${project}::all" onclick="devAction('stop', '${project}', '')">Stop all</button>
              </div>
            </div>

            ${projectServers.length > 0 ? projectServers.map(ds => `
            <div class="server-card">
              <div class="server-top">
                <span class="server-name">${ds.process}</span>
                <span class="server-status ${ds.running ? 'running' : 'stopped'}">${ds.running ? 'Running' : 'Stopped'}</span>
              </div>
              <div class="server-urls">
              <div class="server-url">
                <span class="label">Local</span>
                <span class="port">${ds.localUrl || 'n/a'}</span>
              </div>
              <div class="server-url">
                <span class="label">Public</span>
                ${ds.tailscaleUrl ? `<a href="${ds.tailscaleUrl}" target="_blank">${ds.tailscaleUrl}</a>` : '<span class="port">n/a</span>'}
              </div>
              </div>
              <div class="server-actions">
                <button class="open" onclick="${ds.tailscaleUrl ? `window.open('${ds.tailscaleUrl}', '_blank')` : 'void(0)'}" ${!ds.running || !ds.tailscaleUrl ? 'disabled' : ''}>Open</button>
                <button class="restart" data-target="${project}::${ds.process}" onclick="devAction('restart', '${project}', '${ds.process}')">Restart</button>
                <button class="${ds.running ? 'stop' : 'start'}" data-target="${project}::${ds.process}"
                  onclick="devAction('${ds.running ? 'stop' : 'start'}', '${project}', '${ds.process}')">
                  ${ds.running ? 'Stop' : 'Start'}
                </button>
              </div>
            </div>
            `).join('') : `
            <div class="server-empty">
              No registered devenv processes yet. Start once with <code>vaibhav dev start ${project}</code>
            </div>
            `}
          </div>`;
        $list.appendChild(li);
      });
    }

    async function loadServers() {
      try {
        const data = await fetchStatus();
        renderServers(data.devServers || [], data.projects || []);
      } catch (e) {
        $loading.style.display = 'none';
        $empty.style.display = 'block';
        $empty.innerHTML = '<span style="color:#FF5555">Failed to load status</span>';
      }
    }

    async function devAction(action, project, process) {
      const target = `${project}::${process || 'all'}`;
      const btns = document.querySelectorAll(`button[data-target="${target}"]`);
      btns.forEach(b => { b.disabled = true; b.style.opacity = '0.5'; });
      const label = process ? `${project}/${process}` : `${project} (all)`;
      const verb = action === 'stop' ? 'Stopping' : action === 'start' ? 'Starting' : 'Restarting';
      showToast(`${verb} ${label}...`, '', true);

      try {
        const res = await fetch('/api/dev', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action, project, process }),
        });
        const data = await res.json();
        if (data.ok) {
          const expectedRunning = action !== 'stop';
          showToast(
            `Waiting for ${label} to ${expectedRunning ? 'be ready' : 'stop'}...`,
            '',
            true,
          );

          const reached = await pollUntilState(project, process, expectedRunning);
          if (reached) {
            showToast(
              `${label} ${expectedRunning ? 'running' : 'stopped'}`,
              'success',
            );
          } else {
            showToast(
              `${label} is still ${expectedRunning ? 'starting' : 'stopping'} (timed out)` ,
              'error',
            );
          }
        } else {
          showToast(data.error || 'Action failed', 'error');
        }
      } catch (e) {
        showToast('Request failed', 'error');
      } finally {
        btns.forEach(b => { b.disabled = false; b.style.opacity = ''; });
      }

      setTimeout(loadServers, 300);
    }

    loadServers();
    setInterval(loadServers, 10000);
  </script>
</body>
</html>
