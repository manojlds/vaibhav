<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
  <title>vaibhav · terminal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #1a1a2e; color: #e0e0e0; font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace; }

    #top-bar {
      display: none;
      align-items: center;
      justify-content: space-between;
      height: 36px;
      padding: 0 12px;
      background: #16162a;
      border-bottom: 1px solid #2a2a4a;
      font-size: 13px;
    }
    #top-bar.visible { display: flex; }
    #top-bar .session-label { color: #00d9ff; font-weight: 600; }
    #top-bar .session-label::before { content: '❯ '; color: #555; }
    #top-bar button {
      background: none;
      border: 1px solid #2a2a4a;
      color: #888;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      transition: color .15s, border-color .15s;
    }
    #top-bar button:hover { color: #00d9ff; border-color: #00d9ff; }

    #app-wrapper {
      display: flex;
      flex-direction: column;
      /* height set dynamically by JS using visualViewport.height */
      overflow: hidden;
    }
    #terminal {
      display: none;
      flex: 1;
      min-height: 0;
      position: relative;
      overflow: hidden;
      background: #1a1a2e;
      padding: 4px;
      touch-action: none;
    }
    #terminal.visible { display: block; }
    #terminal canvas { display: block; }
    #terminal textarea { pointer-events: none !important; }

    /* Session picker */
    #picker {
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100dvh;
      padding: 16px 16px 0;
      overflow-y: auto;
    }
    #picker.hidden { display: none; }
    #picker h1 {
      font-size: 18px;
      font-weight: 600;
      color: #00d9ff;
      margin-bottom: 6px;
    }
    #picker .subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
    }
    #filter-box {
      width: 100%;
      max-width: 420px;
      margin-bottom: 12px;
    }
    #filter-input {
      width: 100%;
      background: #16162a;
      border: 1px solid #2a2a4a;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 14px;
      padding: 10px 12px;
      border-radius: 6px;
      outline: none;
      transition: border-color .15s;
    }
    #filter-input:focus { border-color: #00d9ff; }
    #filter-input::placeholder { color: #555; }
    #session-list {
      list-style: none;
      width: 100%;
      max-width: 420px;
      padding-bottom: 24px;
    }
    #session-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    #session-list li:hover { border-color: #00d9ff; background: rgba(0,217,255,.05); }
    #session-list li.active { border-color: #3a3a5a; background: rgba(0,217,255,.03); }
    #session-list li.inactive { border-color: #222240; opacity: 0.7; }
    #session-list .item-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    #session-list .icon { font-size: 14px; flex-shrink: 0; }
    #session-list .name { font-weight: 600; color: #e0e0e0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #session-list .badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; flex-shrink: 0; }
    #session-list .badge-active { background: rgba(76,175,80,.15); color: #4caf50; }
    #session-list .badge-project { background: rgba(0,217,255,.1); color: #00d9ff; }
    #picker .empty { color: #555; font-size: 14px; }
    #picker .error { color: #e74c3c; font-size: 13px; margin-top: 12px; }
    #picker .loading { color: #555; font-size: 14px; }

    /* Tool picker modal */
    #tool-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #tool-modal-overlay.visible { display: flex; }
    #tool-modal {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 20px;
      width: 90%;
      max-width: 320px;
    }
    #tool-modal h3 { color: #00d9ff; font-size: 15px; margin-bottom: 14px; }
    #tool-modal button {
      display: block;
      width: 100%;
      background: #16162a;
      border: 1px solid #2a2a4a;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 14px;
      padding: 10px 14px;
      border-radius: 6px;
      margin-bottom: 6px;
      cursor: pointer;
      text-align: left;
      transition: border-color .15s, background .15s;
    }
    #tool-modal button:hover { border-color: #00d9ff; background: rgba(0,217,255,.05); }
    #tool-modal .cancel { color: #666; text-align: center; margin-top: 4px; margin-bottom: 0; }
  </style>
</head>
<body>
  <div id="app-wrapper">
  <div id="top-bar">
    <span class="session-label" id="bar-session-name"></span>
    <button id="btn-switch" onclick="showPicker()">switch</button>
  </div>
  <div id="terminal"></div>
  </div>

  <div id="picker">
    <h1>⚡ vaibhav</h1>
    <p class="subtitle">select a session or start a project</p>
    <div id="filter-box">
      <input id="filter-input" type="text" placeholder="filter..." autocomplete="off" />
    </div>
    <ul id="session-list"><li class="loading">loading…</li></ul>
  </div>

  <div id="tool-modal-overlay" onclick="if(event.target===this)closeToolModal()">
    <div id="tool-modal">
      <h3 id="tool-modal-title"></h3>
      <button onclick="openWithTool('amp')">⚡ Amp</button>
      <button onclick="openWithTool('claude')">🤖 Claude Code</button>
      <button onclick="openWithTool('pi')">🥧 pi</button>
      <button onclick="openWithTool('opencode')">📝 OpenCode</button>
      <button onclick="openWithTool('codex')">🧬 Codex</button>
      <button onclick="openWithTool('')">🐚 Shell only</button>
      <button class="cancel" onclick="closeToolModal()">cancel</button>
    </div>
  </div>

  <script type="module">
    import { init, Terminal, FitAddon } from '/ghostty/ghostty-web.js';

    let term = null;
    let ws = null;
    let currentSession = null;

    // --- URL helpers ---
    function getSessionFromURL() {
      return new URLSearchParams(location.search).get('session') || '';
    }

    function setSessionURL(name) {
      const url = new URL(location.href);
      url.searchParams.set('session', name);
      history.replaceState(null, '', url);
    }

    // --- UI helpers ---
    const $picker = document.getElementById('picker');
    const $terminal = document.getElementById('terminal');
    const $topBar = document.getElementById('top-bar');
    const $barName = document.getElementById('bar-session-name');
    const $list = document.getElementById('session-list');
    const $filter = document.getElementById('filter-input');
    const $toolOverlay = document.getElementById('tool-modal-overlay');
    const $toolTitle = document.getElementById('tool-modal-title');

    let statusData = null; // cached /api/status response
    let toolPickerProject = null;

    window.showPicker = async function showPicker() {
      disconnect();
      $topBar.classList.remove('visible');
      $terminal.classList.remove('visible');
      $picker.classList.remove('hidden');
      document.getElementById('app-wrapper').style.height = '0';
      $filter.value = '';
      await loadStatus();
    };

    function showTerminal(sessionName) {
      $picker.classList.add('hidden');
      $topBar.classList.add('visible');
      $terminal.classList.add('visible');
      $barName.textContent = sessionName;
    }

    // --- Fuzzy search (matches Android app) ---
    function fuzzyMatch(target, query) {
      const t = target.toLowerCase(), q = query.toLowerCase();
      let ti = 0;
      for (const qc of q) {
        const found = t.indexOf(qc, ti);
        if (found < 0) return false;
        ti = found + 1;
      }
      return true;
    }

    function fuzzyScore(target, query) {
      const t = target.toLowerCase(), q = query.toLowerCase();
      let score = 0, ti = 0, prevMatch = -2;
      for (const qc of q) {
        const found = t.indexOf(qc, ti);
        if (found < 0) return 0;
        score += 10;
        if (found === prevMatch + 1) score += 5;
        if (found === 0) score += 3;
        prevMatch = found;
        ti = found + 1;
      }
      return score - t.length;
    }

    // --- Fetch status & render ---
    async function loadStatus() {
      $list.innerHTML = '<li class="loading">loading…</li>';
      try {
        const res = await fetch('/api/status');
        statusData = await res.json();
        renderList();
      } catch (e) {
        $list.innerHTML = `<li class="empty">failed to load</li><p class="error">${esc(e.message)}</p>`;
      }
    }

    function buildItems() {
      if (!statusData) return [];
      const projects = statusData.projects || [];
      const sessions = statusData.sessions || [];
      const projectNames = new Set(projects.map(p => p.name));
      const items = [];

      // Active projects first
      for (const p of projects) {
        if (p.active) items.push({ name: p.name, active: true, isProject: true });
      }
      // Active sessions not in projects
      for (const s of sessions) {
        if (!projectNames.has(s)) items.push({ name: s, active: true, isProject: false });
      }
      // Inactive projects
      for (const p of projects) {
        if (!p.active) items.push({ name: p.name, active: false, isProject: true });
      }
      return items;
    }

    function renderList() {
      const filter = $filter.value.trim();
      let items = buildItems();

      if (filter) {
        items = items.filter(i => fuzzyMatch(i.name, filter))
                     .sort((a, b) => fuzzyScore(b.name, filter) - fuzzyScore(a.name, filter));
      }

      if (!items.length) {
        $list.innerHTML = filter
          ? `<li class="empty">no matches for "${esc(filter)}"</li>`
          : '<li class="empty">no projects or sessions found</li>';
        return;
      }

      $list.innerHTML = '';
      for (const item of items) {
        const li = document.createElement('li');
        li.className = item.active ? 'active' : 'inactive';
        const icon = item.active ? '🖥️' : '▶️';
        const badge = item.active
          ? '<span class="badge badge-active">active</span>'
          : (item.isProject ? '<span class="badge badge-project">project</span>' : '');
        li.innerHTML = `
          <span class="item-left">
            <span class="icon">${icon}</span>
            <span class="name">${esc(item.name)}</span>
          </span>
          ${badge}`;
        li.onclick = () => handleItemClick(item);
        $list.appendChild(li);
      }
    }

    function handleItemClick(item) {
      if (item.active) {
        // Active session/project — connect directly
        connectSession(item.name);
      } else {
        // Inactive project — show tool picker
        toolPickerProject = item.name;
        $toolTitle.textContent = item.name;
        $toolOverlay.classList.add('visible');
      }
    }

    window.closeToolModal = function() {
      $toolOverlay.classList.remove('visible');
      toolPickerProject = null;
    };

    window.openWithTool = async function(tool) {
      const project = toolPickerProject;
      if (!project) return;
      closeToolModal();

      $list.innerHTML = `<li class="loading">starting ${esc(project)}${tool ? ' + ' + esc(tool) : ''}…</li>`;

      try {
        const res = await fetch('/api/open', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ project, tool }),
        });
        const data = await res.json();
        if (!data.ok) {
          $list.innerHTML = `<li class="empty">failed to open ${esc(project)}</li><p class="error">${esc(data.error || 'unknown error')}</p>`;
          return;
        }
        connectSession(project);
      } catch (e) {
        $list.innerHTML = `<li class="empty">error opening project</li><p class="error">${esc(e.message)}</p>`;
      }
    };

    // Filter input handler
    $filter.addEventListener('input', () => {
      if (statusData) renderList();
    });

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // --- Terminal connection ---
    async function connectSession(name) {
      currentSession = name;
      setSessionURL(name);
      showTerminal(name);

      await init();

      if (term) {
        term.dispose();
      }
      $terminal.innerHTML = '';

      term = new Terminal({
        cols: 80,
        rows: 24,
        fontFamily: 'JetBrains Mono, Menlo, Monaco, monospace',
        fontSize: 14,
        theme: { background: '#1a1a2e', foreground: '#e0e0e0' },
      });

      const fitAddon = new FitAddon();
      term.loadAddon(fitAddon);
      await term.open($terminal);

      // Single source of truth for viewport height: visualViewport API
      // Avoids dvh bugs on Android Chrome and prevents triple-fire oscillation
      let resizeTimer = null;
      function applyViewportHeight() {
        const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        document.getElementById('app-wrapper').style.height = vh + 'px';
        fitAddon.fit();
      }

      applyViewportHeight();

      function debouncedResize() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(applyViewportHeight, 100);
      }

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', debouncedResize);
        window.visualViewport.addEventListener('scroll', debouncedResize);
      } else {
        window.addEventListener('resize', debouncedResize);
      }

      const cols = term.cols;
      const rows = term.rows;

      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/ws/${encodeURIComponent(name)}?cols=${cols}&rows=${rows}`);

      // Mobile input bridge: ghostty-web doesn't handle mobile virtual keyboards
      // where keydown fires with key="Unidentified". We intercept beforeinput on
      // the hidden textarea and send data directly to the WebSocket + terminal.
      const textarea = $terminal.querySelector('textarea');
      console.log('[vaibhav] hidden textarea found:', !!textarea);
      if (textarea) {
        // Block ghostty-web from processing keyboard events — its keydown
        // handler can't map mobile virtual keyboard input (key="Unidentified")
        // and interferes with our bridge. Capture phase runs before ghostty's
        // bubble-phase listeners.
        textarea.addEventListener('keydown', (e) => {
          e.stopImmediatePropagation();
        }, true);

        // Mobile input bridge: beforeinput gives us inputType + data for all
        // mobile keyboard actions. No preventDefault — let the textarea update
        // naturally so subsequent events (especially backspace) keep firing.
        textarea.addEventListener('beforeinput', (e) => {
          let toSend = null;
          if (e.inputType === 'insertText' && e.data) {
            toSend = e.data;
          } else if (e.inputType === 'insertLineBreak') {
            toSend = '\r';
          } else if (e.inputType === 'deleteContentBackward') {
            toSend = '\x7f';
          } else if (e.inputType === 'insertFromPaste' && e.data) {
            toSend = e.data;
          }

          if (toSend && ws && ws.readyState === WebSocket.OPEN) {
            ws.send(toSend);
          }
        });

        // Keep textarea from going empty (backspace needs content) or too long
        textarea.addEventListener('input', () => {
          if (textarea.value.length === 0) {
            textarea.value = ' ';
            textarea.selectionStart = textarea.selectionEnd = 1;
          } else if (textarea.value.length > 50) {
            textarea.value = textarea.value.slice(-5);
            textarea.selectionStart = textarea.selectionEnd = textarea.value.length;
          }
        });

        // --- Touch handling: scroll, tap-to-click, and keyboard focus ---
        // textarea has pointer-events:none so taps reach the canvas/container.
        // We handle taps here to send mouse clicks to tmux and focus textarea
        // for keyboard input.

        let touchStartY = null;
        let touchStartX = null;
        let touchMoved = false;
        let lastScrollTime = 0;
        const scrollThreshold = 20;
        const tapThreshold = 10; // max movement to count as a tap

        function getCellCoords(clientX, clientY) {
          const canvas = $terminal.querySelector('canvas');
          if (!canvas) return null;
          const rect = canvas.getBoundingClientRect();
          const x = clientX - rect.left;
          const y = clientY - rect.top;
          const cellW = rect.width / term.cols;
          const cellH = rect.height / term.rows;
          return {
            col: Math.floor(x / cellW) + 1,
            row: Math.floor(y / cellH) + 1,
          };
        }

        function sendMouseClick(col, row) {
          if (!ws || ws.readyState !== WebSocket.OPEN) return;
          // SGR mouse mode: press then release left button (button 0)
          ws.send(`\x1b[<0;${col};${row}M`);
          ws.send(`\x1b[<0;${col};${row}m`);
        }

        function sendScroll(up) {
          if (!ws || ws.readyState !== WebSocket.OPEN) return;
          ws.send(up ? '\x1b[A' : '\x1b[B');
        }

        $terminal.addEventListener('touchstart', (e) => {
          if (e.touches.length === 1) {
            touchStartY = e.touches[0].clientY;
            touchStartX = e.touches[0].clientX;
            touchMoved = false;
          }
        }, { passive: true });

        $terminal.addEventListener('touchmove', (e) => {
          if (touchStartY === null || e.touches.length !== 1) return;

          const touch = e.touches[0];
          const dx = Math.abs(touch.clientX - touchStartX);
          const dy = Math.abs(touch.clientY - touchStartY);

          if (dx > tapThreshold || dy > tapThreshold) {
            touchMoved = true;
          }

          e.preventDefault();
          const deltaY = touchStartY - touch.clientY;
          const now = Date.now();

          if (Math.abs(deltaY) >= scrollThreshold && now - lastScrollTime > 30) {
            const lines = Math.max(1, Math.floor(Math.abs(deltaY) / scrollThreshold));
            const up = deltaY < 0;
            for (let i = 0; i < lines; i++) {
              sendScroll(up);
            }
            touchStartY = touch.clientY;
            lastScrollTime = now;
          }
        }, { passive: false });

        $terminal.addEventListener('touchend', (e) => {
          // If it was a tap (not a scroll), send mouse click to tmux
          if (!touchMoved && touchStartX !== null) {
            const coords = getCellCoords(touchStartX, touchStartY);
            if (coords) {
              sendMouseClick(coords.col, coords.row);
            }
          }
          touchStartY = null;
          touchStartX = null;
          touchMoved = false;
          // Always keep textarea focused for keyboard input
          textarea.focus();
        }, { passive: true });

        // Also handle paste events directly
        textarea.addEventListener('paste', (e) => {
          const text = e.clipboardData?.getData('text');
          if (text && ws && ws.readyState === WebSocket.OPEN) {
            console.log('[vaibhav] paste:', text.length, 'chars');
            ws.send(text);
          }
        });
      }

      ws.onopen = () => {
        console.log('[vaibhav] ws open');
        term.focus();
      };

      ws.onmessage = (e) => {
        term.write(e.data);
      };

      ws.onclose = (e) => {
        console.log('[vaibhav] ws closed', e.code, e.reason);
        term.write('\r\n\x1b[90m[session ended]\x1b[0m\r\n');
      };

      ws.onerror = (e) => {
        console.error('[vaibhav] ws error', e);
        term.write('\r\n\x1b[31m[connection error]\x1b[0m\r\n');
      };

      term.onResize(({ cols, rows }) => {
        console.log('[vaibhav] resize', cols, rows);
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'resize', cols, rows }));
        }
      });
    }

    function disconnect() {
      if (ws) {
        ws.close();
        ws = null;
      }
      if (term) {
        term.dispose();
        term = null;
      }
      $terminal.innerHTML = '';
      currentSession = null;
    }

    // --- Init ---
    const urlSession = getSessionFromURL();
    if (urlSession) {
      connectSession(urlSession);
    } else {
      loadStatus();
    }
  </script>
</body>
</html>
