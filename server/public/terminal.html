<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon-192.png" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <title>vaibhav · terminal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #1a1a2e; color: #e0e0e0; font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace; }

    #top-bar {
      display: none;
      align-items: center;
      justify-content: space-between;
      height: 36px;
      padding: 0 12px;
      background: #16162a;
      border-bottom: 1px solid #2a2a4a;
      font-size: 13px;
    }
    #top-bar.visible { display: flex; }
    #top-bar .session-label { color: #00d9ff; font-weight: 600; }
    #top-bar .session-label::before { content: '❯ '; color: #555; }
    #top-bar button {
      background: none;
      border: 1px solid #2a2a4a;
      color: #888;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      transition: color .15s, border-color .15s;
    }
    #top-bar button:hover { color: #00d9ff; border-color: #00d9ff; }
    #top-bar div { display: flex; gap: 6px; }

    #app-wrapper {
      display: flex;
      flex-direction: column;
      /* height set dynamically by JS using visualViewport.height */
      overflow: hidden;
    }
    #terminal {
      display: none;
      flex: 1;
      min-height: 0;
      position: relative;
      overflow: hidden;
      background: #1a1a2e;
      padding: 0;
      touch-action: none;
    }
    #terminal.visible { display: block; }
    #terminal canvas { display: block; }
    #terminal textarea { pointer-events: none !important; }

    /* Session picker */
    #picker {
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100dvh;
      padding: 16px 16px 0;
      overflow-y: auto;
    }
    #picker.hidden { display: none; }
    #picker h1 {
      font-size: 18px;
      font-weight: 600;
      color: #00d9ff;
      margin-bottom: 6px;
    }
    #picker .subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
    }
    #filter-box {
      width: 100%;
      max-width: 420px;
      margin-bottom: 12px;
    }
    #filter-input {
      width: 100%;
      background: #16162a;
      border: 1px solid #2a2a4a;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 14px;
      padding: 10px 12px;
      border-radius: 6px;
      outline: none;
      transition: border-color .15s;
    }
    #filter-input:focus { border-color: #00d9ff; }
    #filter-input::placeholder { color: #555; }
    #session-list {
      list-style: none;
      width: 100%;
      max-width: 420px;
      padding-bottom: 24px;
    }
    #session-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      margin-bottom: 4px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    #session-list li:hover { border-color: #00d9ff; background: rgba(0,217,255,.05); }
    #session-list li.active { border-color: #3a3a5a; background: rgba(0,217,255,.03); }
    #session-list li.inactive { border-color: #222240; opacity: 0.7; }
    #session-list li.window-item {
      padding: 6px 14px 6px 38px;
      font-size: 13px;
      border-color: #222240;
      margin-bottom: 2px;
      border-radius: 4px;
    }
    #session-list li.window-item .name { font-weight: 400; color: #aaa; }
    #session-list li.window-item .icon { font-size: 12px; }
    #session-list li.window-item.win-active .name { color: #00d9ff; font-weight: 600; }
    #session-list .item-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    #session-list .item-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    #session-list .icon { font-size: 14px; flex-shrink: 0; }
    #session-list .name { font-weight: 600; color: #e0e0e0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #session-list .badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; flex-shrink: 0; }
    #session-list .badge-active { background: rgba(76,175,80,.15); color: #4caf50; }
    #session-list .badge-project { background: rgba(0,217,255,.1); color: #00d9ff; }
    #session-list .kill-btn {
      background: none; border: 1px solid transparent; color: #555;
      font-size: 13px; padding: 2px 6px; border-radius: 4px; cursor: pointer;
      font-family: inherit; transition: color .15s, border-color .15s;
      flex-shrink: 0;
    }
    #session-list .kill-btn:hover { color: #e74c3c; border-color: #e74c3c; }
    #picker .empty { color: #555; font-size: 14px; }
    #picker .error { color: #e74c3c; font-size: 13px; margin-top: 12px; }
    #picker .loading { color: #555; font-size: 14px; }

    /* Tool picker modal */
    #tool-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #tool-modal-overlay.visible { display: flex; }
    #tool-modal {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 20px;
      width: 90%;
      max-width: 320px;
    }
    #tool-modal h3 { color: #00d9ff; font-size: 15px; margin-bottom: 14px; }
    #tool-modal button {
      display: block;
      width: 100%;
      background: #16162a;
      border: 1px solid #2a2a4a;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 14px;
      padding: 10px 14px;
      border-radius: 6px;
      margin-bottom: 6px;
      cursor: pointer;
      text-align: left;
      transition: border-color .15s, background .15s;
    }
    #tool-modal button:hover { border-color: #00d9ff; background: rgba(0,217,255,.05); }
    #tool-modal .cancel { color: #666; text-align: center; margin-top: 4px; margin-bottom: 0; }

    /* Extra keys bar */
    #extra-keys {
      display: none;
      flex-shrink: 0;
      background: #16162a;
      border-top: 1px solid #2a2a4a;
      padding: 4px 4px;
      gap: 3px;
      flex-wrap: wrap;
      justify-content: center;
    }
    #extra-keys.visible { display: flex; }
    #extra-keys button {
      background: #2a2a3e;
      border: 1px solid #3a3a5a;
      color: #ccc;
      font-family: inherit;
      font-size: 13px;
      min-width: 36px;
      height: 32px;
      padding: 0 8px;
      border-radius: 4px;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      transition: background .1s, border-color .1s;
    }
    #extra-keys button:active { background: #3a3a5a; }
    #extra-keys button.modifier { color: #888; }
    #extra-keys button.modifier.held { background: #00d9ff; color: #1a1a2e; border-color: #00d9ff; }
    #extra-keys .arrow { font-size: 15px; min-width: 32px; padding: 0 6px; }

    /* Reconnect overlay */
    #reconnect-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(26,26,46,.85);
      z-index: 50;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
    }
    #reconnect-overlay.visible { display: flex; }
    #reconnect-overlay .msg { color: #888; font-size: 14px; }
    #reconnect-overlay button {
      background: #00d9ff;
      color: #1a1a2e;
      border: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 28px;
      border-radius: 6px;
      cursor: pointer;
    }
    #reconnect-overlay .countdown { color: #555; font-size: 12px; }
  </style>
</head>
<body>
  <div id="app-wrapper">
  <div id="top-bar">
    <span class="session-label" id="bar-session-name"></span>
    <div>
      <button id="btn-keys" onclick="toggleKeys()">⌨</button>
      <button id="btn-switch" onclick="showPicker()">switch</button>
    </div>
  </div>
  <div id="terminal">
    <div id="reconnect-overlay">
      <div class="msg" id="reconnect-msg">connection lost</div>
      <button id="reconnect-btn" onclick="reconnectNow()">reconnect</button>
      <div class="countdown" id="reconnect-countdown"></div>
    </div>
  </div>
  <div id="extra-keys">
    <button class="modifier" data-mod="ctrl">Ctrl</button>
    <button class="modifier" data-mod="alt">Alt</button>
    <button data-key="Escape">Esc</button>
    <button data-key="Tab">Tab</button>
    <button class="arrow" data-key="ArrowUp">↑</button>
    <button class="arrow" data-key="ArrowDown">↓</button>
    <button class="arrow" data-key="ArrowLeft">←</button>
    <button class="arrow" data-key="ArrowRight">→</button>
    <button data-key="|">|</button>
    <button data-key="~">~</button>
    <button data-key="/">/</button>
    <button data-key="-">-</button>
    <button data-key="_">_</button>
    <button id="font-dec" data-action="font-dec">A−</button>
    <button id="font-inc" data-action="font-inc">A+</button>
  </div>
  </div>

  <div id="picker">
    <h1>⚡ vaibhav</h1>
    <p class="subtitle">select a session or start a project</p>
    <div id="filter-box">
      <input id="filter-input" type="text" placeholder="filter..." autocomplete="off" />
    </div>
    <ul id="session-list"><li class="loading">loading…</li></ul>
  </div>

  <div id="tool-modal-overlay" onclick="if(event.target===this)closeToolModal()">
    <div id="tool-modal">
      <h3 id="tool-modal-title"></h3>
      <button onclick="openWithTool('amp')">⚡ Amp</button>
      <button onclick="openWithTool('claude')">🤖 Claude Code</button>
      <button onclick="openWithTool('pi')">🥧 pi</button>
      <button onclick="openWithTool('opencode')">📝 OpenCode</button>
      <button onclick="openWithTool('codex')">🧬 Codex</button>
      <button onclick="openWithTool('')">🐚 Shell only</button>
      <button class="cancel" onclick="closeToolModal()">cancel</button>
    </div>
  </div>

  <script type="module">
    import { init, Terminal, FitAddon } from '/ghostty/ghostty-web.js';

    let term = null;
    let ws = null;
    let currentSession = null;

    // --- URL helpers ---
    function getSessionFromURL() {
      return new URLSearchParams(location.search).get('session') || '';
    }

    function setSessionURL(name) {
      const url = new URL(location.href);
      url.searchParams.set('session', name);
      history.replaceState(null, '', url);
    }

    // --- UI helpers ---
    const $picker = document.getElementById('picker');
    const $terminal = document.getElementById('terminal');
    const $topBar = document.getElementById('top-bar');
    const $barName = document.getElementById('bar-session-name');
    const $list = document.getElementById('session-list');
    const $filter = document.getElementById('filter-input');
    const $toolOverlay = document.getElementById('tool-modal-overlay');
    const $toolTitle = document.getElementById('tool-modal-title');
    const $extraKeys = document.getElementById('extra-keys');
    const $reconnectOverlay = document.getElementById('reconnect-overlay');
    const $reconnectMsg = document.getElementById('reconnect-msg');
    const $reconnectCountdown = document.getElementById('reconnect-countdown');

    let statusData = null; // cached /api/status response
    let toolPickerProject = null;
    let reconnectTimer = null;
    let reconnectAttempt = 0;
    let currentFontSize = parseInt(localStorage.getItem('vaibhav-fontsize')) || 14;
    let currentFitAddon = null;

    // --- Modifier state for extra keys ---
    const modifiers = { ctrl: false, alt: false };

    function clearModifiers() {
      modifiers.ctrl = false;
      modifiers.alt = false;
      document.querySelectorAll('#extra-keys .modifier').forEach(b => b.classList.remove('held'));
    }

    // --- Extra keys handler ---
    function setupExtraKeys() {
      $extraKeys.addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (!btn) return;
        e.preventDefault();

        // Modifier toggle
        const mod = btn.dataset.mod;
        if (mod) {
          modifiers[mod] = !modifiers[mod];
          btn.classList.toggle('held', modifiers[mod]);
          refocusTerminal();
          return;
        }

        const action = btn.dataset.action;
        if (action === 'font-dec' || action === 'font-inc') {
          currentFontSize = Math.max(8, Math.min(28, currentFontSize + (action === 'font-inc' ? 2 : -2)));
          localStorage.setItem('vaibhav-fontsize', currentFontSize);
          if (term) {
            term.setFontSize(currentFontSize);
            if (currentFitAddon) currentFitAddon.fit();
          }
          refocusTerminal();
          return;
        }

        const key = btn.dataset.key;
        if (!key || !ws || ws.readyState !== WebSocket.OPEN) return;

        let seq = '';
        if (key === 'Escape') {
          seq = '\x1b';
        } else if (key === 'Tab') {
          seq = modifiers.ctrl ? '\x1b[27;5;9~' : '\t';
        } else if (key === 'ArrowUp') {
          seq = modifiers.alt ? '\x1b\x1b[A' : '\x1b[A';
        } else if (key === 'ArrowDown') {
          seq = modifiers.alt ? '\x1b\x1b[B' : '\x1b[B';
        } else if (key === 'ArrowLeft') {
          seq = modifiers.alt ? '\x1b\x1b[D' : '\x1b[D';
        } else if (key === 'ArrowRight') {
          seq = modifiers.alt ? '\x1b\x1b[C' : '\x1b[C';
        } else if (key.length === 1) {
          if (modifiers.ctrl) {
            // Ctrl+letter: send control character
            const code = key.toUpperCase().charCodeAt(0);
            if (code >= 65 && code <= 90) {
              seq = String.fromCharCode(code - 64);
            } else {
              seq = key;
            }
          } else if (modifiers.alt) {
            seq = '\x1b' + key;
          } else {
            seq = key;
          }
        }

        if (seq) {
          ws.send(seq);
          clearModifiers();
        }
        refocusTerminal();
      });
    }

    function refocusTerminal() {
      const textarea = $terminal.querySelector('textarea');
      if (textarea) textarea.focus();
    }

    window.showPicker = async function showPicker() {
      disconnect();
      $topBar.classList.remove('visible');
      $terminal.classList.remove('visible');
      $extraKeys.classList.remove('visible');
      $picker.classList.remove('hidden');
      document.getElementById('app-wrapper').style.height = '0';
      $filter.value = '';
      await loadStatus();
    };

    let keysVisible = localStorage.getItem('vaibhav-keys') !== 'hidden';

    function showTerminal(sessionName) {
      $picker.classList.add('hidden');
      $topBar.classList.add('visible');
      $terminal.classList.add('visible');
      if (keysVisible) $extraKeys.classList.add('visible');
      $barName.textContent = sessionName;
    }

    window.toggleKeys = function() {
      keysVisible = !keysVisible;
      localStorage.setItem('vaibhav-keys', keysVisible ? 'visible' : 'hidden');
      $extraKeys.classList.toggle('visible', keysVisible);
      if (currentFitAddon) setTimeout(() => currentFitAddon.fit(), 50);
      refocusTerminal();
    };

    // --- Reconnect ---
    function showReconnect(reason) {
      $reconnectOverlay.classList.add('visible');
      $reconnectMsg.textContent = reason || 'connection lost';
      scheduleReconnect();
    }

    function hideReconnect() {
      $reconnectOverlay.classList.remove('visible');
      $reconnectCountdown.textContent = '';
      if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }
    }

    function scheduleReconnect() {
      reconnectAttempt++;
      // Backoff: 2s, 4s, 8s, max 15s
      const delay = Math.min(2000 * Math.pow(2, reconnectAttempt - 1), 15000);
      const secs = Math.ceil(delay / 1000);
      let remaining = secs;
      $reconnectCountdown.textContent = `reconnecting in ${remaining}s…`;

      const tick = setInterval(() => {
        remaining--;
        if (remaining > 0) {
          $reconnectCountdown.textContent = `reconnecting in ${remaining}s…`;
        } else {
          clearInterval(tick);
        }
      }, 1000);

      reconnectTimer = setTimeout(() => {
        clearInterval(tick);
        if (currentSession) {
          $reconnectCountdown.textContent = 'reconnecting…';
          connectSession(currentSession);
        }
      }, delay);
    }

    window.reconnectNow = function() {
      if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }
      if (currentSession) {
        $reconnectCountdown.textContent = 'reconnecting…';
        connectSession(currentSession);
      }
    };

    // --- Fuzzy search (matches Android app) ---
    function fuzzyMatch(target, query) {
      const t = target.toLowerCase(), q = query.toLowerCase();
      let ti = 0;
      for (const qc of q) {
        const found = t.indexOf(qc, ti);
        if (found < 0) return false;
        ti = found + 1;
      }
      return true;
    }

    function fuzzyScore(target, query) {
      const t = target.toLowerCase(), q = query.toLowerCase();
      let score = 0, ti = 0, prevMatch = -2;
      for (const qc of q) {
        const found = t.indexOf(qc, ti);
        if (found < 0) return 0;
        score += 10;
        if (found === prevMatch + 1) score += 5;
        if (found === 0) score += 3;
        prevMatch = found;
        ti = found + 1;
      }
      return score - t.length;
    }

    // --- Fetch status & render ---
    async function loadStatus() {
      $list.innerHTML = '<li class="loading">loading…</li>';
      try {
        const res = await fetch('/api/status');
        statusData = await res.json();
        renderList();
      } catch (e) {
        $list.innerHTML = `<li class="empty">failed to load</li><p class="error">${esc(e.message)}</p>`;
      }
    }

    function buildItems() {
      if (!statusData) return [];
      const projects = statusData.projects || [];
      const sessions = statusData.sessions || [];
      const windows = statusData.windows || [];
      const projectNames = new Set(projects.map(p => p.name));
      const sessionMap = new Map(sessions.map(s => [s.name, s]));
      const windowMap = new Map();
      for (const w of windows) {
        if (!windowMap.has(w.session)) windowMap.set(w.session, []);
        windowMap.get(w.session).push(w);
      }
      const items = [];

      // Active projects first
      for (const p of projects) {
        if (p.active) {
          const s = sessionMap.get(p.name);
          items.push({ type: 'session', name: p.name, active: true, isProject: true, windows: s?.windows, attached: s?.attached, windowList: windowMap.get(p.name) || [] });
        }
      }
      // Active sessions not in projects
      for (const s of sessions) {
        if (!projectNames.has(s.name)) items.push({ type: 'session', name: s.name, active: true, isProject: false, windows: s.windows, attached: s.attached, windowList: windowMap.get(s.name) || [] });
      }
      // Inactive projects
      for (const p of projects) {
        if (!p.active) items.push({ type: 'session', name: p.name, active: false, isProject: true, windowList: [] });
      }
      return items;
    }

    function renderList() {
      const filter = $filter.value.trim();
      let items = buildItems();

      if (filter) {
        items = items.filter(i => fuzzyMatch(i.name, filter))
                     .sort((a, b) => fuzzyScore(b.name, filter) - fuzzyScore(a.name, filter));
      }

      if (!items.length) {
        $list.innerHTML = filter
          ? `<li class="empty">no matches for "${esc(filter)}"</li>`
          : '<li class="empty">no projects or sessions found</li>';
        return;
      }

      $list.innerHTML = '';
      for (const item of items) {
        // Session row
        const li = document.createElement('li');
        li.className = item.active ? 'active' : 'inactive';
        const icon = item.active ? '🖥️' : '▶️';
        let badgeHtml = '';
        if (item.active) {
          const parts = [];
          if (item.attached) parts.push('attached');
          const detail = parts.length ? ` · ${parts.join(' · ')}` : '';
          badgeHtml = `<span class="badge badge-active">active${esc(detail)}</span>`;
        } else if (item.isProject) {
          badgeHtml = '<span class="badge badge-project">project</span>';
        }
        const killHtml = item.active
          ? `<button class="kill-btn" title="Kill session" data-kill-session="${esc(item.name)}">✕</button>`
          : '';
        li.innerHTML = `
          <span class="item-left">
            <span class="icon">${icon}</span>
            <span class="name">${esc(item.name)}</span>
          </span>
          <span class="item-right">${badgeHtml}${killHtml}</span>`;
        li.onclick = (e) => {
          if (e.target.closest('.kill-btn')) return;
          handleItemClick(item);
        };
        $list.appendChild(li);

        // Window rows (tree children)
        if (item.active && item.windowList.length > 0) {
          for (const w of item.windowList) {
            const wli = document.createElement('li');
            wli.className = 'window-item' + (w.active ? ' win-active' : '');
            const wKill = item.windowList.length > 1
              ? `<button class="kill-btn" title="Kill window" data-kill-session="${esc(item.name)}" data-kill-window="${esc(String(w.index))}">✕</button>`
              : '';
            wli.innerHTML = `
              <span class="item-left">
                <span class="icon">${w.active ? '▸' : '·'}</span>
                <span class="name">${esc(w.index + ':' + w.name)}</span>
              </span>
              <span class="item-right">${wKill}</span>`;
            wli.onclick = (e) => {
              if (e.target.closest('.kill-btn')) return;
              connectSession(item.name);
            };
            $list.appendChild(wli);
          }
        }
      }

      // Attach kill handlers via delegation
      $list.onclick = async (e) => {
        const btn = e.target.closest('.kill-btn');
        if (!btn) return;
        e.stopPropagation();
        const session = btn.dataset.killSession;
        const win = btn.dataset.killWindow || '';
        const label = win ? `window ${win}` : `session "${session}"`;
        if (!confirm(`Kill ${label}?`)) return;
        try {
          const res = await fetch('/api/kill', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ session, window: win }),
          });
          const data = await res.json();
          if (!data.ok) alert(data.error || 'failed');
          await loadStatus();
        } catch (err) {
          alert(err.message);
        }
      };
    }

    function handleItemClick(item) {
      if (item.active) {
        // Active session/project — connect directly
        connectSession(item.name);
      } else {
        // Inactive project — show tool picker
        toolPickerProject = item.name;
        $toolTitle.textContent = item.name;
        $toolOverlay.classList.add('visible');
      }
    }

    window.closeToolModal = function() {
      $toolOverlay.classList.remove('visible');
      toolPickerProject = null;
    };

    window.openWithTool = async function(tool) {
      const project = toolPickerProject;
      if (!project) return;
      closeToolModal();

      $list.innerHTML = `<li class="loading">starting ${esc(project)}${tool ? ' + ' + esc(tool) : ''}…</li>`;

      try {
        const res = await fetch('/api/open', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ project, tool }),
        });
        const data = await res.json();
        if (!data.ok) {
          $list.innerHTML = `<li class="empty">failed to open ${esc(project)}</li><p class="error">${esc(data.error || 'unknown error')}</p>`;
          return;
        }
        connectSession(project);
      } catch (e) {
        $list.innerHTML = `<li class="empty">error opening project</li><p class="error">${esc(e.message)}</p>`;
      }
    };

    // Filter input handler
    $filter.addEventListener('input', () => {
      if (statusData) renderList();
    });

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // --- Terminal connection ---
    async function connectSession(name) {
      currentSession = name;
      setSessionURL(name);
      showTerminal(name);
      hideReconnect();

      await init();

      if (term) {
        term.dispose();
      }
      // Preserve the reconnect overlay element
      const overlay = $reconnectOverlay;
      $terminal.innerHTML = '';
      $terminal.appendChild(overlay);

      term = new Terminal({
        cols: 80,
        rows: 24,
        fontFamily: 'JetBrains Mono, Menlo, Monaco, monospace',
        fontSize: currentFontSize,
        theme: { background: '#1a1a2e', foreground: '#e0e0e0' },
      });

      const fitAddon = new FitAddon();
      currentFitAddon = fitAddon;
      term.loadAddon(fitAddon);
      await term.open($terminal);

      // Patch FitAddon: ghostty-web reserves 15px for a scrollbar we don't have
      const origPropose = fitAddon.proposeDimensions.bind(fitAddon);
      fitAddon.proposeDimensions = function() {
        const dims = origPropose();
        if (!dims || !term.renderer) return dims;
        const metrics = term.renderer.getMetrics();
        if (!metrics || metrics.width === 0) return dims;
        // Add back the 15px scrollbar reservation
        dims.cols = Math.max(dims.cols, Math.floor($terminal.clientWidth / metrics.width));
        dims.rows = Math.max(dims.rows, Math.floor($terminal.clientHeight / metrics.height));
        return dims;
      };

      // Single source of truth for viewport height: visualViewport API
      // Avoids dvh bugs on Android Chrome and prevents triple-fire oscillation
      let resizeTimer = null;
      function applyViewportHeight() {
        const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        document.getElementById('app-wrapper').style.height = vh + 'px';
        requestAnimationFrame(() => fitAddon.fit());
      }

      // Wait for layout to settle before first fit
      await new Promise(r => requestAnimationFrame(r));
      applyViewportHeight();

      function debouncedResize() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(applyViewportHeight, 100);
      }

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', debouncedResize);
        window.visualViewport.addEventListener('scroll', debouncedResize);
      } else {
        window.addEventListener('resize', debouncedResize);
      }

      const cols = term.cols;
      const rows = term.rows;

      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/ws/${encodeURIComponent(name)}?cols=${cols}&rows=${rows}`);

      // Mobile input bridge: ghostty-web doesn't handle mobile virtual keyboards
      // where keydown fires with key="Unidentified". We intercept beforeinput on
      // the hidden textarea and send data directly to the WebSocket + terminal.
      const textarea = $terminal.querySelector('textarea');
      console.log('[vaibhav] hidden textarea found:', !!textarea);
      if (textarea) {
        // Block ghostty-web from processing keyboard events — its keydown
        // handler can't map mobile virtual keyboard input (key="Unidentified")
        // and interferes with our bridge. Capture phase runs before ghostty's
        // bubble-phase listeners.
        textarea.addEventListener('keydown', (e) => {
          e.stopImmediatePropagation();
        }, true);

        // Mobile input bridge: beforeinput gives us inputType + data for all
        // mobile keyboard actions. No preventDefault — let the textarea update
        // naturally so subsequent events (especially backspace) keep firing.
        textarea.addEventListener('beforeinput', (e) => {
          let toSend = null;
          if (e.inputType === 'insertText' && e.data) {
            toSend = e.data;
          } else if (e.inputType === 'insertLineBreak') {
            toSend = '\r';
          } else if (e.inputType === 'deleteContentBackward') {
            toSend = '\x7f';
          } else if (e.inputType === 'insertFromPaste' && e.data) {
            toSend = e.data;
          }

          if (toSend && ws && ws.readyState === WebSocket.OPEN) {
            ws.send(toSend);
          }
        });

        // Keep textarea from going empty (backspace needs content) or too long
        textarea.addEventListener('input', () => {
          if (textarea.value.length === 0) {
            textarea.value = ' ';
            textarea.selectionStart = textarea.selectionEnd = 1;
          } else if (textarea.value.length > 50) {
            textarea.value = textarea.value.slice(-5);
            textarea.selectionStart = textarea.selectionEnd = textarea.value.length;
          }
        });

        // --- Touch handling: scroll, tap-to-click, and keyboard focus ---
        // textarea has pointer-events:none so taps reach the canvas/container.
        // We handle taps here to send mouse clicks to tmux and focus textarea
        // for keyboard input.

        let touchStartY = null;
        let touchStartX = null;
        let touchMoved = false;
        let lastScrollTime = 0;
        const scrollThreshold = 20;
        const tapThreshold = 10; // max movement to count as a tap

        function getCellCoords(clientX, clientY) {
          const canvas = $terminal.querySelector('canvas');
          if (!canvas) return null;
          const rect = canvas.getBoundingClientRect();
          const x = clientX - rect.left;
          const y = clientY - rect.top;
          const cellW = rect.width / term.cols;
          const cellH = rect.height / term.rows;
          return {
            col: Math.floor(x / cellW) + 1,
            row: Math.floor(y / cellH) + 1,
          };
        }

        function sendMouseClick(col, row) {
          if (!ws || ws.readyState !== WebSocket.OPEN) return;
          // SGR mouse mode: press then release left button (button 0)
          ws.send(`\x1b[<0;${col};${row}M`);
          ws.send(`\x1b[<0;${col};${row}m`);
        }

        function sendScroll(up, col, row) {
          if (!ws || ws.readyState !== WebSocket.OPEN) return;
          // SGR mouse wheel: button 64 = scroll up, 65 = scroll down
          const btn = up ? 64 : 65;
          ws.send(`\x1b[<${btn};${col};${row}M`);
        }

        $terminal.addEventListener('touchstart', (e) => {
          if (e.touches.length === 1) {
            touchStartY = e.touches[0].clientY;
            touchStartX = e.touches[0].clientX;
            touchMoved = false;
          }
        }, { passive: true });

        $terminal.addEventListener('touchmove', (e) => {
          if (touchStartY === null || e.touches.length !== 1) return;

          const touch = e.touches[0];
          const dx = Math.abs(touch.clientX - touchStartX);
          const dy = Math.abs(touch.clientY - touchStartY);

          if (dx > tapThreshold || dy > tapThreshold) {
            touchMoved = true;
          }

          e.preventDefault();
          const deltaY = touchStartY - touch.clientY;
          const now = Date.now();

          if (Math.abs(deltaY) >= scrollThreshold && now - lastScrollTime > 30) {
            const lines = Math.max(1, Math.floor(Math.abs(deltaY) / scrollThreshold));
            const up = deltaY < 0;
            const coords = getCellCoords(touch.clientX, touch.clientY);
            const col = coords ? coords.col : 1;
            const row = coords ? coords.row : 1;
            for (let i = 0; i < lines; i++) {
              sendScroll(up, col, row);
            }
            touchStartY = touch.clientY;
            lastScrollTime = now;
          }
        }, { passive: false });

        $terminal.addEventListener('touchend', (e) => {
          // If it was a tap (not a scroll), send mouse click to tmux
          if (!touchMoved && touchStartX !== null) {
            const coords = getCellCoords(touchStartX, touchStartY);
            if (coords) {
              sendMouseClick(coords.col, coords.row);
            }
          }
          touchStartY = null;
          touchStartX = null;
          touchMoved = false;
          // Always keep textarea focused for keyboard input
          textarea.focus();
        }, { passive: true });

        // Also handle paste events directly — wrap in bracketed paste mode
        textarea.addEventListener('paste', (e) => {
          const text = e.clipboardData?.getData('text');
          if (text && ws && ws.readyState === WebSocket.OPEN) {
            console.log('[vaibhav] paste:', text.length, 'chars');
            ws.send('\x1b[200~' + text + '\x1b[201~');
          }
        });
      }

      ws.onopen = () => {
        console.log('[vaibhav] ws open');
        reconnectAttempt = 0;
        hideReconnect();
        term.focus();
      };

      ws.onmessage = (e) => {
        term.write(e.data);
      };

      ws.onclose = (e) => {
        console.log('[vaibhav] ws closed', e.code, e.reason);
        // Code 1000 = clean close (e.g. tmux detach / session killed)
        if (e.code === 1000) {
          term.write('\r\n\x1b[90m[session ended]\x1b[0m\r\n');
          showReconnect('session ended');
        } else {
          term.write('\r\n\x1b[90m[connection lost]\x1b[0m\r\n');
          showReconnect('connection lost');
        }
      };

      ws.onerror = (e) => {
        console.error('[vaibhav] ws error', e);
      };

      term.onResize(({ cols, rows }) => {
        console.log('[vaibhav] resize', cols, rows);
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'resize', cols, rows }));
        }
      });
    }

    function disconnect() {
      if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }
      reconnectAttempt = 0;
      hideReconnect();
      if (ws) {
        ws.close();
        ws = null;
      }
      if (term) {
        term.dispose();
        term = null;
      }
      const overlay = $reconnectOverlay;
      $terminal.innerHTML = '';
      $terminal.appendChild(overlay);
      currentSession = null;
    }

    // --- Service Worker registration ---
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    // --- Init ---
    setupExtraKeys();
    const urlSession = getSessionFromURL();
    if (urlSession) {
      connectSession(urlSession);
    } else {
      loadStatus();
    }
  </script>
</body>
</html>
