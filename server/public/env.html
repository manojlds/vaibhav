<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="icon" href="/icon-192.png" />
  <title>vaibhav · env</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: system-ui, -apple-system, sans-serif; min-height: 100dvh; }

    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #2a2a4a;
      position: sticky; top: 0; background: #1a1a2e; z-index: 10;
    }
    .header h1 { font-size: 18px; font-weight: 600; color: #00d9ff; }
    .header a {
      color: #555; text-decoration: none; font-size: 13px;
      padding: 4px 12px; border: 1px solid #2a2a4a; border-radius: 6px;
    }
    .header a:hover { color: #00d9ff; border-color: #00d9ff; }

    .content { padding: 16px 20px; max-width: 900px; margin: 0 auto; }

    .loading { color: #555; font-size: 14px; text-align: center; margin-top: 40px; }
    .empty { color: #555; font-size: 14px; text-align: center; margin-top: 40px; }

    /* Project list */
    .project-card {
      background: #141428;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .project-card:hover { border-color: #3a3a6a; background: #1a1a38; }
    .project-card.active { border-color: #00d9ff; background: #0f1f2f; }
    .project-name { font-weight: 600; color: #e7e7f7; font-size: 15px; }
    .project-meta { color: #666; font-size: 12px; margin-top: 2px; }
    .env-badge {
      display: inline-block;
      background: #2a2a4a;
      color: #00d9ff;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      margin-right: 6px;
      margin-top: 6px;
    }

    /* Env editor */
    .editor-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
      gap: 10px;
      flex-wrap: wrap;
    }
    .editor-title { font-weight: 600; color: #00d9ff; font-size: 16px; }
    .editor-actions { display: flex; gap: 8px; }

    .btn {
      background: #2a2a4a;
      color: #e0e0e0;
      border: 1px solid #3a3a5a;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: #3a3a5a; border-color: #4a4a6a; }
    .btn.primary { background: #00d9ff; color: #1a1a2e; border-color: #00d9ff; font-weight: 600; }
    .btn.primary:hover { background: #33e2ff; }
    .btn.danger { background: #4a1a1a; color: #ff8888; border-color: #5a2a2a; }
    .btn.danger:hover { background: #5a2a2a; }
    .btn.small { padding: 5px 10px; font-size: 12px; }

    .file-tabs {
      display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px;
    }
    .file-tab {
      background: #1a1a38;
      color: #888;
      border: 1px solid #2a2a4a;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .file-tab:hover { border-color: #3a3a5a; color: #ccc; }
    .file-tab.active { background: #0f1f2f; color: #00d9ff; border-color: #00d9ff; }

    /* Entry rows */
    .entry-list { display: flex; flex-direction: column; gap: 8px; }
    .entry-row {
      display: flex; gap: 8px; align-items: flex-start;
      background: #141428;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 10px 12px;
    }
    .entry-row.comment { border-left: 3px solid #555; opacity: 0.8; }
    .entry-row input {
      background: #0f0f1f;
      color: #e0e0e0;
      border: 1px solid #2a2a4a;
      border-radius: 5px;
      padding: 8px 10px;
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      outline: none;
      flex: 1;
    }
    .entry-row input:focus { border-color: #00d9ff; }
    .entry-row input.key { flex: 0 0 140px; max-width: 40%; }
    .entry-row input.value { flex: 2; }
    .entry-row input.comment { flex: 2; color: #888; font-style: italic; }
    .entry-row .entry-actions {
      display: flex; gap: 4px;
      flex-shrink: 0;
    }
    .entry-row .icon-btn {
      background: transparent;
      border: 1px solid #2a2a4a;
      color: #888;
      width: 32px; height: 32px;
      border-radius: 5px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .icon-btn:hover { color: #ff6666; border-color: #5a2a2a; background: #2a1a1a; }

    .add-row {
      display: flex; gap: 8px;
      margin-top: 8px;
    }

    /* Raw view */
    .raw-textarea {
      width: 100%;
      min-height: 300px;
      background: #0f0f1f;
      color: #e0e0e0;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      resize: vertical;
      outline: none;
    }
    .raw-textarea:focus { border-color: #00d9ff; }

    .toast {
      position: fixed;
      bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #2a2a4a;
      color: #e0e0e0;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 100;
      transition: opacity 0.3s;
      border: 1px solid #3a3a5a;
    }
    .toast.success { background: #162d20; color: #7af0a0; border-color: #2a5a3a; }
    .toast.error { background: #2d1616; color: #ff9999; border-color: #5a2a2a; }

    /* Back button */
    .back-btn {
      display: inline-flex; align-items: center; gap: 4px;
      color: #888; font-size: 13px; cursor: pointer;
      margin-bottom: 12px;
    }
    .back-btn:hover { color: #00d9ff; }

    @media (max-width: 600px) {
      .entry-row { flex-wrap: wrap; }
      .entry-row input.key { flex: 1 1 100%; max-width: 100%; }
      .entry-row input.value { flex: 1 1 100%; }
      .editor-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚙️ Env Manager</h1>
    <a href="/">← Home</a>
  </div>

  <div class="content" id="app">
    <div class="loading">Loading projects…</div>
  </div>

  <script>
    (function() {
      const app = document.getElementById('app');
      let state = { view: 'list', projects: [], selectedProject: null, selectedFile: null, entries: [], raw: '' };

      function toast(msg, type) {
        const el = document.createElement('div');
        el.className = `toast ${type || ''}`;
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2500);
      }

      async function loadProjects() {
        app.innerHTML = '<div class="loading">Loading projects…</div>';
        try {
          const res = await fetch('/api/env');
          const data = await res.json();
          state.projects = data.projects || [];
          renderList();
        } catch (e) {
          app.innerHTML = `<div class="empty">Error loading projects: ${e.message}</div>`;
        }
      }

      function renderList() {
        if (!state.projects.length) {
          app.innerHTML = '<div class="empty">No projects found.</div>';
          return;
        }
        const html = state.projects.map(p => {
          if (p.envFiles.length === 0) {
            return `
              <div class="project-card" data-name="${p.name}">
                <div class="project-name">${p.name}</div>
                <div class="project-meta">${p.path}</div>
                <div><span class="env-badge" style="color:#888;background:#1a1a2e;border:1px dashed #3a3a5a;">no .env files</span></div>
              </div>
            `;
          }
          const badges = p.envFiles.map(f => `<span class="env-badge">${f}</span>`).join('');
          return `
            <div class="project-card" data-name="${p.name}">
              <div class="project-name">${p.name}</div>
              <div class="project-meta">${p.path}</div>
              <div>${badges}</div>
            </div>
          `;
        }).join('');
        app.innerHTML = html;
        app.querySelectorAll('.project-card').forEach(card => {
          card.addEventListener('click', () => openProject(card.dataset.name));
        });
      }

      async function openProject(name) {
        state.selectedProject = name;
        state.selectedFile = null;
        state.entries = [];
        app.innerHTML = '<div class="loading">Loading env files…</div>';
        try {
          const res = await fetch(`/api/env?project=${encodeURIComponent(name)}`);
          const data = await res.json();
          if (data.ok === false) {
            app.innerHTML = `<div class="empty">${data.error}</div>`;
            return;
          }
          const files = data.envFiles || [];
          if (!files.length) {
            state.view = 'editor';
            state.selectedFile = '.env';
            state.entries = [];
            renderEditor();
            return;
          }
          // Auto-select first file
          selectFile(name, files[0]);
        } catch (e) {
          app.innerHTML = `<div class="empty">Error: ${e.message}</div>`;
        }
      }

      async function selectFile(project, file) {
        state.selectedFile = file;
        app.innerHTML = '<div class="loading">Loading env file…</div>';
        try {
          const res = await fetch(`/api/env?project=${encodeURIComponent(project)}&file=${encodeURIComponent(file)}`);
          const data = await res.json();
          if (data.ok === false) {
            app.innerHTML = `<div class="empty">${data.error}</div>`;
            return;
          }
          state.entries = data.entries || [];
          state.raw = data.raw || '';
          state.view = 'editor';
          renderEditor();
        } catch (e) {
          app.innerHTML = `<div class="empty">Error: ${e.message}</div>`;
        }
      }

      function renderEditor() {
        const { selectedProject, selectedFile, entries } = state;
        // Get env files for tabs
        const proj = state.projects.find(p => p.name === selectedProject);
        const files = proj ? proj.envFiles : [selectedFile];

        const tabs = files.map(f => `
          <button class="file-tab ${f === selectedFile ? 'active' : ''}" data-file="${f}">${f}</button>
        `).join('');

        const entryRows = entries.map((entry, idx) => {
          if (entry.type === 'comment' || entry.type === 'blank') {
            return `
              <div class="entry-row comment">
                <input type="text" class="comment" value="${escapeHtml(entry.value)}" data-idx="${idx}" placeholder="# comment or blank line">
                <div class="entry-actions">
                  <button class="icon-btn" onclick="deleteEntry(${idx})" title="Delete">×</button>
                </div>
              </div>
            `;
          }
          return `
            <div class="entry-row">
              <input type="text" class="key" value="${escapeHtml(entry.key)}" data-idx="${idx}" data-field="key" placeholder="KEY">
              <input type="text" class="value" value="${escapeHtml(entry.value)}" data-idx="${idx}" data-field="value" placeholder="value">
              <div class="entry-actions">
                <button class="icon-btn" onclick="deleteEntry(${idx})" title="Delete">×</button>
              </div>
            </div>
          `;
        }).join('');

        app.innerHTML = `
          <div class="back-btn" onclick="backToList()">← ${selectedProject}</div>
          <div class="editor-header">
            <div class="editor-title">${selectedFile}</div>
            <div class="editor-actions">
              <button class="btn small" onclick="toggleRaw()">Raw</button>
              <button class="btn primary" onclick="saveEnv()">Save</button>
            </div>
          </div>
          <div class="file-tabs">${tabs}</div>
          <div class="entry-list" id="entry-list">${entryRows}</div>
          <div class="add-row">
            <button class="btn" onclick="addEntry()">+ Add variable</button>
            <button class="btn" onclick="addComment()">+ Add comment</button>
          </div>
        `;

        // Wire up tab switching
        app.querySelectorAll('.file-tab').forEach(tab => {
          tab.addEventListener('click', () => selectFile(selectedProject, tab.dataset.file));
        });

        // Wire up inputs
        app.querySelectorAll('.entry-row input').forEach(input => {
          input.addEventListener('input', () => {
            const idx = parseInt(input.dataset.idx, 10);
            const field = input.dataset.field;
            if (field) {
              state.entries[idx][field] = input.value;
            } else {
              state.entries[idx].value = input.value;
            }
          });
        });
      }

      function renderRaw() {
        const { selectedProject, selectedFile, raw } = state;
        app.innerHTML = `
          <div class="back-btn" onclick="backToList()">← ${selectedProject}</div>
          <div class="editor-header">
            <div class="editor-title">${selectedFile} (raw)</div>
            <div class="editor-actions">
              <button class="btn small" onclick="renderEditor()">Editor</button>
              <button class="btn primary" onclick="saveRaw()">Save</button>
            </div>
          </div>
          <textarea class="raw-textarea" id="raw-ta">${escapeHtml(raw)}</textarea>
        `;
      }

      window.backToList = function() {
        state.view = 'list';
        state.selectedProject = null;
        state.selectedFile = null;
        renderList();
      };

      window.openProject = openProject;

      window.selectFile = selectFile;

      window.toggleRaw = function() {
        if (state.view === 'raw') {
          state.view = 'editor';
          renderEditor();
        } else {
          state.view = 'raw';
          renderRaw();
        }
      };

      window.addEntry = function() {
        state.entries.push({ type: 'var', key: '', value: '', line: state.entries.length });
        renderEditor();
        // Focus the new key input
        const inputs = app.querySelectorAll('.entry-row input.key');
        if (inputs.length) inputs[inputs.length - 1].focus();
      };

      window.addComment = function() {
        state.entries.push({ type: 'comment', value: '# ', line: state.entries.length });
        renderEditor();
        const inputs = app.querySelectorAll('.entry-row input.comment');
        if (inputs.length) inputs[inputs.length - 1].focus();
      };

      window.deleteEntry = function(idx) {
        state.entries.splice(idx, 1);
        renderEditor();
      };

      window.saveEnv = async function() {
        const payload = {
          project: state.selectedProject,
          file: state.selectedFile,
          entries: state.entries,
        };
        try {
          const res = await fetch('/api/env', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          if (data.ok) {
            toast('Saved!', 'success');
          } else {
            toast(data.error || 'Save failed', 'error');
          }
        } catch (e) {
          toast(e.message, 'error');
        }
      };

      window.saveRaw = async function() {
        const ta = document.getElementById('raw-ta');
        const raw = ta.value;
        // Parse and save as entries
        state.entries = parseClient(raw);
        await saveEnv();
      };

      window.createNewEnv = async function() {
        state.selectedFile = '.env';
        state.entries = [];
        state.view = 'editor';
        renderEditor();
      };

      function escapeHtml(str) {
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function parseClient(content) {
        const lines = content.split('\n');
        const entries = [];
        for (let i = 0; i < lines.length; i++) {
          const raw = lines[i];
          const trimmed = raw.trim();
          if (trimmed === '' || trimmed.startsWith('#')) {
            entries.push({ type: 'comment', value: raw, line: i });
            continue;
          }
          const eq = trimmed.indexOf('=');
          if (eq === -1) {
            entries.push({ type: 'comment', value: raw, line: i });
            continue;
          }
          const key = trimmed.slice(0, eq).trim();
          let value = trimmed.slice(eq + 1);
          if ((value.startsWith('"') && value.endsWith('"')) || (value.startsWith("'") && value.endsWith("'"))) {
            value = value.slice(1, -1);
          }
          entries.push({ type: 'var', key, value, line: i });
        }
        return entries;
      }

      // Init
      loadProjects();
    })();
  </script>
</body>
</html>
