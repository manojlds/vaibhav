# vaibhav ralph configuration
# Auto-generated — edit as needed

project:
  name: "vaibhav"
  language: "Bash + TypeScript"
  framework: "CLI tooling + Pi extension"

commands:
  lint: "shellcheck -S error bin/vaibhav bin/vaibhav-ralph"
  build: "npm pack --dry-run"

rules:
  - "use set -euo pipefail in bash scripts"
  - "follow existing color/output helper conventions (step/ok/warn)"
  - "keep Pi extension code modular under extensions/vaibhav/src"
  - "keep new Pi-native workflows additive; do not break existing vaibhav ralph CLI behavior"
  - "treat skills in skills/vaibhav-* as the source of truth for init/prd/convert/loop behavior"
  - "prefer minimal, focused edits and preserve current UX"

boundaries:
  never_touch:
    - "*.lock"
    - ".env*"

engine: "pi"
max_retries: 3
